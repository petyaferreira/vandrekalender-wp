  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

isplay:flex;align-items:center;gap:34px;font-size:15px;font-weight:500;color:#EAF2E6\">\n        <span>Kalender<\u002Fspan><span>Kort<\u002Fspan><span>Om<\u002Fspan><span style=\"color:#fff;font-weight:600\">Kontakt<\u002Fspan>\n      <\u002Fnav>\n      <div style=\"display:flex;align-items:center;gap:22px\">\n        <span style=\"font-size:15px;font-weight:500;color:#EAF2E6\">Log ind<\u002Fspan>\n        <a style=\"text-decoration:none;display:inline-flex;align-items:center;justify-content:center;padding:12px 32px;border-radius:10px;background:#F4F1E9;color:#2E5D3B;font-size:15px;font-weight:600\">Opret begivenhed<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- hero -->\n  <section style=\"position:relative;height:320px;overflow:hidden\">\n    <image-slot id=\"vk-hero-1a\" shape=\"rect\" placeholder=\"Slip et vandrebillede her\" style=\"position:absolute;inset:0;width:100%;height:100%\"><\u002Fimage-slot>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(135deg,#5b7a4e 0%,#3c5538 45%,#2a3f2a 100%);z-index:-1\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(18,28,18,.74) 0%,rgba(18,28,18,.5) 50%,rgba(18,28,18,.28) 100%);pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:relative;height:100%;max-width:1200px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;justify-content:center;pointer-events:none\">\n      <div style=\"display:inline-flex;align-self:flex-start;align-items:center;gap:8px;padding:7px 14px;border:1px solid rgba(255,255,255,.35);border-radius:999px;font-size:13px;font-weight:500;color:#EAF2E6;margin-bottom:20px\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#9BD27F\"><\u002Fspan> Vi læser hver eneste besked\n      <\u002Fdiv>\n      <h1 style=\"font-size:50px;line-height:1.05;font-weight:800;letter-spacing:-.025em;color:#fff;margin:0 0 14px\">Kontakt os<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.5;color:rgba(255,255,255,.9);margin:0;max-width:560px\">Har du et spørgsmål, et forslag til en tur eller fundet en fejl? Skriv til os — vi vil meget gerne høre fra dig.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- body -->\n  <section style=\"max-width:1200px;margin:0 auto;padding:56px 20px 72px;display:grid;grid-template-columns:1fr 400px;gap:40px;align-items:start\">\n\n    <!-- form card -->\n    <div style=\"background:#fff;border:1px solid #ece8df;border-radius:16px;padding:40px;box-shadow:0 2px 10px rgba(40,38,30,.05)\">\n      <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:40px 20px\">\n          <div style=\"width:64px;height:64px;border-radius:999px;background:#E7EFE4;color:#2E5D3B;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px\">✓<\u002Fdiv>\n          <h2 style=\"font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 10px\">Tak for din besked!<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.55;color:#6B675E;margin:0 0 24px\">Vi har modtaget den og vender tilbage til dig hurtigst muligt.<\u002Fp>\n          <button onclick=\"{{ reset }}\" class=\"vk-send\" style=\"border:1px solid #d8d1c2;background:#fff;color:#44413b;padding:13px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer\">Skriv en ny besked<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <h2 style=\"font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px\">Send os en besked<\u002Fh2>\n        <p style=\"font-size:15px;line-height:1.5;color:#6B675E;margin:0 0 28px\">Udfyld formularen, så vender vi tilbage på e-mail.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:20px\">\n          <label style=\"display:block\">\n            <span style=\"display:block;font-size:14px;font-weight:600;color:#3a372f;margin-bottom:8px\">Navn<\u002Fspan>\n            <input value=\"{{ name }}\" oninput=\"{{ onName }}\" type=\"text\" placeholder=\"Dit navn\" style=\"width:100%;height:50px;padding:0 16px;background:#faf9f5;border:1px solid #e3ddd0;border-radius:10px;font-size:16px;color:#211F1A\">\n          <\u002Flabel>\n          <label style=\"display:block\">\n            <span style=\"display:block;font-size:14px;font-weight:600;color:#3a372f;margin-bottom:8px\">E-mail<\u002Fspan>\n            <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"dig@eksempel.dk\" style=\"width:100%;height:50px;padding:0 16px;background:#faf9f5;border:1px solid #e3ddd0;border-radius:10px;font-size:16px;color:#211F1A\">\n            <span style=\"display:block;font-size:13px;color:#8a857c;margin-top:7px\">Så vi kan svare dig — vi deler den aldrig.<\u002Fspan>\n          <\u002Flabel>\n          <label style=\"display:block\">\n            <span style=\"display:block;font-size:14px;font-weight:600;color:#3a372f;margin-bottom:8px\">Besked<\u002Fspan>\n            <textarea value=\"{{ msg }}\" oninput=\"{{ onMsg }}\" placeholder=\"Skriv din besked her…\" style=\"width:100%;height:150px;padding:14px 16px;background:#faf9f5;border:1px solid #e3ddd0;border-radius:10px;font-size:16px;line-height:1.5;color:#211F1A;resize:vertical\"><\u002Ftextarea>\n          <\u002Flabel>\n          <button onclick=\"{{ submit }}\" class=\"vk-send\" style=\"align-self:flex-start;border:none;background:#2E5D3B;color:#fff;padding:16px 34px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer\">Send besked<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- side column -->\n    <div style=\"display:flex;flex-direction:column;gap:24px\">\n      <div style=\"background:#E7EFE4;border-radius:16px;padding:28px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n          <span style=\"font-size:20px\">🕑<\u002Fspan>\n          <h3 style=\"font-size:17px;font-weight:700;margin:0;color:#1F2A1F\">Hvad kan du forvente?<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.55;color:#43503f;margin:0\">Vi svarer typisk inden for <strong>1–2 hverdage<\u002Fstrong>. I weekender kan det tage lidt længere — vi er nok ude at vandre.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #ece8df;border-radius:16px;padding:28px\">\n        <h3 style=\"font-size:17px;font-weight:700;margin:0 0 18px;color:#211F1A\">Kom hurtigt videre<\u002Fh3>\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <a class=\"vk-ql\" style=\"text-decoration:none;display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;color:#211F1A;cursor:pointer\">\n            <span style=\"width:40px;height:40px;flex:none;border-radius:11px;background:#E7EFE4;display:flex;align-items:center;justify-content:center;font-size:18px\">📅<\u002Fspan>\n            <span><span style=\"display:block;font-size:15px;font-weight:600\">Se kalenderen<\u002Fspan><span style=\"display:block;font-size:13px;color:#8a857c\">312 ture i hele Danmark<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <a class=\"vk-ql\" style=\"text-decoration:none;display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;color:#211F1A;cursor:pointer\">\n            <span style=\"width:40px;height:40px;flex:none;border-radius:11px;background:#E7EFE4;display:flex;align-items:center;justify-content:center;font-size:18px\">🗺️<\u002Fspan>\n            <span><span style=\"display:block;font-size:15px;font-weight:600\">Udforsk kortet<\u002Fspan><span style=\"display:block;font-size:13px;color:#8a857c\">Find ture nær dig<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <a class=\"vk-ql\" style=\"text-decoration:none;display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;color:#211F1A;cursor:pointer\">\n            <span style=\"width:40px;height:40px;flex:none;border-radius:11px;background:#E7EFE4;display:flex;align-items:center;justify-content:center;font-size:18px\">➕<\u002Fspan>\n            <span><span style=\"display:block;font-size:15px;font-weight:600\">Opret en begivenhed<\u002Fspan><span style=\"display:block;font-size:13px;color:#8a857c\">Del din egen tur — gratis<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <a class=\"vk-ql\" style=\"text-decoration:none;display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;color:#211F1A;cursor:pointer\">\n            <span style=\"width:40px;height:40px;flex:none;border-radius:11px;background:#E7EFE4;display:flex;align-items:center;justify-content:center;font-size:18px\">❓<\u002Fspan>\n            <span><span style=\"display:block;font-size:15px;font-weight:600\">Ofte stillede spørgsmål<\u002Fspan><span style=\"display:block;font-size:13px;color:#8a857c\">Måske er svaret her allerede<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"background:#2E5D3B;color:#D8E4D2\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:56px 20px 0;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap\">\n      <div style=\"max-width:320px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <div style=\"width:30px;height:30px;border-radius:10px;background:#F4F1E9;display:flex;align-items:center;justify-content:center\"><span style=\"width:11px;height:11px;border-radius:50%;background:#2E5D3B\"><\u002Fspan><\u002Fdiv>\n          <span style=\"font-size:19px;font-weight:700;color:#fff\">Vandrekalender<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#B7C9AF;margin:0\">Find og del vandreture i Danmark.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:72px\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;font-size:14px;color:#D8E4D2\">\n          <span style=\"color:#8FA886;font-weight:600;margin-bottom:3px\">Sitet<\u002Fspan>\n          <span>Om os<\u002Fspan><span style=\"color:#fff;font-weight:600\">Kontakt<\u002Fspan><span>Opret begivenhed<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;font-size:14px;color:#D8E4D2\">\n          <span style=\"color:#8FA886;font-weight:600;margin-bottom:3px\">Juridisk<\u002Fspan>\n          <span>Privatlivspolitik<\u002Fspan><span>Vilkår<\u002Fspan><span>Cookies<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:24px auto 0;padding:18px 20px;border-top:1px solid rgba(255,255,255,.15);font-size:13px;color:#9DB295\">Vandrekalender.dk — 2026<\u002Fdiv>\n  <\u002Ffooter>\n\n  <x-import component-from-global-scope=\"image-slot\" from=\"9c86e610-6635-4452-99d3-ecfe8a5e3251#/image-slot.js\" hint-size=\"0,0\" style=\"display:none\"><\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name:'', email:'', msg:'', sent:false };\n  renderVals(){\n    const s = this.state;\n    const set = (k) => (e) => this.setState({ [k]: e.target.value });\n    return {\n      name:s.name, email:s.email, msg:s.msg,\n      sent:s.sent, notSent:!s.sent,\n      onName:set('name'), onEmail:set('email'), onMsg:set('msg'),\n      submit:()=>this.setState({sent:true}),\n      reset:()=>this.setState({sent:false,name:'',email:'',msg:''}),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
