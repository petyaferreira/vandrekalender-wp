name: Deploy to Nordicway

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      ref:
        description: 'Branch, tag, or SHA to deploy (empty = default branch)'
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      THEME_NAME: vandrekalender-theme
      PLUGIN_NAME: vandrekalender-events

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install Composer packages
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            wp-content/themes/${{ env.THEME_NAME }}/package-lock.json
            wp-content/plugins/${{ env.PLUGIN_NAME }}/package-lock.json

      - name: Install and Build Theme
        working-directory: wp-content/themes/${{ env.THEME_NAME }}
        run: |
          rm -rf public
          npm ci || npm install
          npm run build

      - name: Install and Build Plugin
        working-directory: wp-content/plugins/${{ env.PLUGIN_NAME }}
        run: |
          rm -rf build
          npm ci || npm install
          npm run build

      - name: Prepare Nordicway deploy structure
        run: |
          mkdir -p nordicway/wp-content/themes/$THEME_NAME
          mkdir -p nordicway/wp-content/plugins/$PLUGIN_NAME

          rsync -av "wp-content/themes/$THEME_NAME/" "nordicway/wp-content/themes/$THEME_NAME" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.gitignore \
            --exclude=.prettierrc \
            --exclude=package.json \
            --exclude=package-lock.json \
            --exclude=webpack.config.js \
            --exclude=phpcs.xml \
            --exclude=composer.json \
            --exclude=composer.lock \
            --exclude=/resources

          rsync -av "wp-content/plugins/$PLUGIN_NAME/" "nordicway/wp-content/plugins/$PLUGIN_NAME" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.gitignore \
            --exclude=package.json \
            --exclude=package-lock.json \
            --exclude=webpack.config.js \
            --exclude=phpcs.xml \
            --exclude=composer.json \
            --exclude=composer.lock \
            --exclude=README.md \
            --exclude=/blocks \
            --exclude=/resources

          # Composer-managed themes and plugins
          for dir in wp-content/themes/*/; do
            name=$(basename "$dir")
            if [ "$name" != "$THEME_NAME" ]; then
              mkdir -p "nordicway/wp-content/themes/$name"
              rsync -av "$dir" "nordicway/wp-content/themes/$name" --exclude=.git
            fi
          done

          for dir in wp-content/plugins/*/; do
            name=$(basename "$dir")
            if [ "$name" != "$PLUGIN_NAME" ]; then
              mkdir -p "nordicway/wp-content/plugins/$name"
              rsync -av "$dir" "nordicway/wp-content/plugins/$name" --exclude=.git
            fi
          done

      - name: Write SSH key and add host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NORDICWAY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.NORDICWAY_SSH_PORT }} ${{ secrets.NORDICWAY_SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create remote wp-content subfolders
        env:
          HOST: ${{ secrets.NORDICWAY_SSH_HOST }}
          USER: ${{ secrets.NORDICWAY_SSH_USERNAME }}
          PORT: ${{ secrets.NORDICWAY_SSH_PORT }}
          DEST: ${{ secrets.NORDICWAY_DEST_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=yes \
            "$USER@$HOST" "mkdir -p '$DEST/themes' '$DEST/plugins'"

      - name: Deploy to Nordicway
        env:
          HOST: ${{ secrets.NORDICWAY_SSH_HOST }}
          USER: ${{ secrets.NORDICWAY_SSH_USERNAME }}
          PORT: ${{ secrets.NORDICWAY_SSH_PORT }}
          DEST: ${{ secrets.NORDICWAY_DEST_PATH }}
        run: |
          echo "Deploying to $USER@$HOST:$DEST (${{ inputs.environment }})"

          RSH="ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=yes"

          # Mirror each theme/plugin into its own remote dir with --delete so
          # stale files are removed. --delete is scoped per-subdir, so other
          # themes/plugins on the server are never touched.
          for dir in nordicway/wp-content/themes/*/; do
            name=$(basename "$dir")
            rsync -az --delete -e "$RSH" "$dir" "$USER@$HOST:$DEST/themes/$name/"
          done

          for dir in nordicway/wp-content/plugins/*/; do
            name=$(basename "$dir")
            rsync -az --delete -e "$RSH" "$dir" "$USER@$HOST:$DEST/plugins/$name/"
          done

          echo "✅ Deployment complete → ${{ inputs.environment }}"

      # Google login credentials live in GitHub Environment secrets, never in
      # git and never in wp-admin. They are delivered as a generated mu-plugin
      # (mu-plugins load before regular plugins, so the constants exist by the
      # time login-with-google reads them). Rewritten on every deploy, so the
      # server always matches what is stored in GitHub.
      - name: Write Google login config
        env:
          HOST: ${{ secrets.NORDICWAY_SSH_HOST }}
          USER: ${{ secrets.NORDICWAY_SSH_USERNAME }}
          PORT: ${{ secrets.NORDICWAY_SSH_PORT }}
          DEST: ${{ secrets.NORDICWAY_DEST_PATH }}
          CLIENT_ID: ${{ secrets.GOOGLE_LOGIN_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_LOGIN_SECRET }}
        run: |
          if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
            echo "::error::GOOGLE_LOGIN_CLIENT_ID / GOOGLE_LOGIN_SECRET not set for the '${{ inputs.environment }}' environment"
            exit 1
          fi

          mkdir -p mu-plugins
          {
            echo '<?php'
            echo '/**'
            echo ' * Google login credentials — GENERATED BY THE DEPLOY WORKFLOW.'
            echo ' *'
            echo ' * Do not edit on the server: every deploy overwrites this file.'
            echo ' * Change the values in GitHub → Settings → Environments instead.'
            echo ' */'
            printf "define( 'WP_GOOGLE_LOGIN_CLIENT_ID', '%s' );\n" "$CLIENT_ID"
            printf "define( 'WP_GOOGLE_LOGIN_SECRET', '%s' );\n" "$CLIENT_SECRET"
            echo "define( 'WP_GOOGLE_LOGIN_USER_REGISTRATION', true );"
          } > mu-plugins/00-vk-google-login.php

          RSH="ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=yes"

          # No --delete here: other mu-plugins on the server must survive.
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes \
            "$USER@$HOST" "mkdir -p '$DEST/mu-plugins'"
          rsync -az -e "$RSH" mu-plugins/00-vk-google-login.php \
            "$USER@$HOST:$DEST/mu-plugins/00-vk-google-login.php"

          echo "✅ Google login config written → ${{ inputs.environment }}"

      - name: Post-deploy sanity check
        env:
          HOST: ${{ secrets.NORDICWAY_SSH_HOST }}
          USER: ${{ secrets.NORDICWAY_SSH_USERNAME }}
          PORT: ${{ secrets.NORDICWAY_SSH_PORT }}
          DEST: ${{ secrets.NORDICWAY_DEST_PATH }}
        run: |
          ssh -T -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "$USER@$HOST" <<'SSHCMDS'
            echo '--- Themes ---'
            ls -lah "${DEST}/themes" || true
            echo '--- Plugins ---'
            ls -lah "${DEST}/plugins" || true
          SSHCMDS
